name: Builds

# Driven by .github/workflows/ci.yml. PR and push-to-main triggers live in
# the parent so a single "CI" check gates every PR regardless of paths.
on:
  workflow_call: {}
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read
  packages: read

env:
  CARGO_TERM_COLOR: always
  # Disable Cargo incremental artifacts. The Rust FFI is built once per
  # submodule SHA and cached whole (see the cargo target cache below), so
  # incremental dirs add nothing but bloat the cached target/ directory and
  # slow the cache upload/download.
  CARGO_INCREMENTAL: "0"
  # vcpkg binary caching for Windows. The x-gha backend was removed from vcpkg,
  # so use vcpkg's files provider and persist that directory with actions/cache.
  VCPKG_GIT_COMMIT: fb87e2bb3fe69e16c224989acb5a61349166c782
  VCPKG_BINARY_CACHE_DIR: ${{ github.workspace }}/.vcpkg-binary-cache
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-binary-cache,readwrite"
  VCPKG_DEFAULT_TRIPLET: x64-windows-static-md
  VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static-md
  VCPKG_TARGET_TRIPLET: x64-windows-static-md

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            build_cmd: ./build.sh release-examples
            build_dir: build-release
          - os: ubuntu-24.04-arm
            name: linux-arm64
            build_cmd: ./build.sh release-examples
            build_dir: build-release
          - os: macos-26-xlarge
            name: macos-arm64
            build_cmd: ./build.sh release-examples
            build_dir: build-release
          - os: macos-26-large
            name: macos-x64
            build_cmd: ./build.sh release-examples --macos-arch x86_64
            build_dir: build-release
            # Pinned to Windows 2022 for current VS 17 implementation
          - os: windows-2022
            name: windows-x64
            build_cmd: .\build.cmd release-examples
            build_dir: build-release

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Pull LFS files
        run: git lfs pull

      # Cargo's freshness check is mtime-based. A fresh `actions/checkout`
      # stamps every submodule source file with the checkout time, which is
      # newer than the cached target/ artifacts — so cargo rebuilds the whole
      # client-sdk-rust workspace (~6 min) even on an exact cargo-target cache
      # hit. Pin all submodule source files to a fixed, deterministic
      # timestamp (older than any cached artifact) so cargo treats them as
      # unchanged across runs and reuses the cached FFI build. Runs before the
      # cargo target cache is restored, so target/ does not yet exist and is
      # never touched. shell: bash so this also runs under Git Bash on Windows.
      - name: Stabilize Rust source mtimes for cargo freshness
        shell: bash
        run: |
          find client-sdk-rust -type f -not -path '*/.git/*' -exec touch -t 202001010000 {} +

      # ---------- vcpkg for Windows ----------
      - name: Restore vcpkg binary cache
        if: runner.os == 'Windows'
        id: cache-vcpkg-binary
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.VCPKG_BINARY_CACHE_DIR }}
          key: ${{ runner.os }}-${{ matrix.name }}-vcpkg-binary-${{ env.VCPKG_TARGET_TRIPLET }}-${{ env.VCPKG_GIT_COMMIT }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.name }}-vcpkg-binary-${{ env.VCPKG_TARGET_TRIPLET }}-${{ env.VCPKG_GIT_COMMIT }}-

      - name: Setup vcpkg (Windows only)
        if: runner.os == 'Windows'
        uses: lukka/run-vcpkg@6fe69898af670ac05f4a8427cc5cff4fb361cee5 # v11.5
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_GIT_COMMIT }}

      # ---------- OS-specific deps ----------
      - name: Install deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            llvm-dev libclang-dev clang \
            libva-dev libdrm-dev libgbm-dev libx11-dev libgl1-mesa-dev \
            libxext-dev libxcomposite-dev libxdamage-dev libxfixes-dev \
            libxrandr-dev libxi-dev libxkbcommon-dev \
            libasound2-dev libpulse-dev \
            libssl-dev \
            libprotobuf-dev protobuf-compiler \
            libabsl-dev \
            libwayland-dev libdecor-0-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          set -eux
          brew update
          brew install cmake ninja protobuf abseil

      # ---------- Rust toolchain ----------
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Install Rust cross-compilation target
        if: matrix.name == 'macos-x64'
        run: rustup target add x86_64-apple-darwin

      # ---------- sccache experiment for Windows Rust builds ----------
      - name: Setup sccache (Windows only)
        if: runner.os == 'Windows'
        uses: mozilla-actions/sccache-action@1583d6b38d7be47f593cb472781bbb21cab4321e # v0.0.10

      - name: Enable sccache for Rust (Windows only)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      # ---------- Cache Cargo ----------
      # The Rust FFI is built from the pinned client-sdk-rust submodule. Its
      # compiled output only changes when the submodule commit changes, so we
      # key the target cache on the submodule SHA (not Cargo.lock, which is
      # pinned inside the submodule and effectively immutable -- that froze the
      # old cache permanently). Resolve it once here for the restore/save steps.
      - name: Resolve Rust submodule SHA
        id: rust_sha
        shell: bash
        run: echo "sha=$(git -C client-sdk-rust rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-${{ matrix.name }}-cargo-registry-${{ hashFiles('client-sdk-rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.name }}-cargo-registry-

      # Restore-only here; the matching save runs after a successful build (see
      # "Save cargo target" below). A combined actions/cache saves in a post-job
      # step that runs AFTER the "Clean after build" cleanup wipes target/debug
      # and target/release, which is why the old cache was always ~empty. The
      # restore/save split lets us snapshot the populated target/ before cleanup.
      - name: Restore cargo target
        id: cache-cargo-target
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: client-sdk-rust/target/
          key: ${{ runner.os }}-${{ matrix.name }}-cargo-target-${{ steps.rust_sha.outputs.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.name }}-cargo-target-

      # ---------- Build environment setup ----------
      - name: Set Linux build environment
        if: runner.os == 'Linux'
        run: |
          echo "CXXFLAGS=-Wno-deprecated-declarations" >> "$GITHUB_ENV"
          echo "CFLAGS=-Wno-deprecated-declarations" >> "$GITHUB_ENV"
          LLVM_VERSION=$(llvm-config --version | cut -d. -f1)
          echo "LIBCLANG_PATH=/usr/lib/llvm-${LLVM_VERSION}/lib" >> "$GITHUB_ENV"

      - name: Reset sccache stats (Windows only)
        if: runner.os == 'Windows'
        shell: bash
        run: sccache --zero-stats

      # ---------- Build ----------
      - name: Build (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x build.sh
          ${{ matrix.build_cmd }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.build_cmd }}

      - name: Show sccache stats (Windows only)
        if: always() && runner.os == 'Windows'
        shell: bash
        run: sccache --show-stats

      # Save the populated target/ now, while the build output still exists and
      # before the "Clean after build" step runs clean-all. Only on a miss --
      # an exact-key hit means the cache already holds this submodule's output.
      # A restore-keys prefix hit still counts as a miss (cache-hit != 'true'),
      # so a submodule bump always refreshes the cache under the new SHA.
      - name: Save cargo target
        if: steps.cache-cargo-target.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: client-sdk-rust/target/
          key: ${{ runner.os }}-${{ matrix.name }}-cargo-target-${{ steps.rust_sha.outputs.sha }}

      - name: Save vcpkg binary cache
        if: runner.os == 'Windows' && steps.cache-vcpkg-binary.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.VCPKG_BINARY_CACHE_DIR }}
          key: ${{ runner.os }}-${{ matrix.name }}-vcpkg-binary-${{ env.VCPKG_TARGET_TRIPLET }}-${{ env.VCPKG_GIT_COMMIT }}-${{ hashFiles('vcpkg.json') }}

      # ---------- Smoke test cpp-example-collection binaries ----------
      # Built under cpp-example-collection-build/ (not build-dir/bin). Visual Studio
      # multi-config places executables in per-target Release/ (or Debug/) subdirs.
      - name: Smoke test examples (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -x
          failed=false
          examples_base="${{ matrix.build_dir }}/cpp-example-collection-build"
          resolve_exe() {
            local dir="$1" name="$2"
            local p="${examples_base}/${dir}/${name}"
            if [[ -x "${p}" ]]; then
              printf '%s' "${p}"
              return 0
            fi
            p="${examples_base}/${dir}/Release/${name}"
            if [[ -x "${p}" ]]; then
              printf '%s' "${p}"
              return 0
            fi
            return 1
          }
          for pair in "SimpleRoom:simple_room" "SimpleRpc:simple_rpc" "SimpleDataStream:simple_data_stream"; do
            exe="${pair%%:*}"
            dir="${pair#*:}"
            if ! exe_path="$(resolve_exe "${dir}" "${exe}")"; then
              echo "ERROR: ${exe} not found under ${examples_base}/${dir}/"
              failed=true
              continue
            fi
            echo "Testing ${exe}..."
            output=$("${exe_path}" --help 2>&1) || true
            if [[ -z "${output}" ]]; then
              echo "ERROR: ${exe} produced no output"
              failed=true
            else
              echo "${output}"
              echo "${exe} ran successfully"
            fi
          done
          if [[ "$failed" == "true" ]]; then exit 1; fi

      - name: Smoke test examples (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $examplesBase = "${{ matrix.build_dir }}/cpp-example-collection-build"
          $examples = @(
            @{ Name = 'SimpleRoom'; Dir = 'simple_room' },
            @{ Name = 'SimpleRpc'; Dir = 'simple_rpc' },
            @{ Name = 'SimpleDataStream'; Dir = 'simple_data_stream' }
          )
          $failed = $false
          foreach ($ex in $examples) {
            $name = $ex.Name
            $dir = $ex.Dir
            $inDir = Join-Path $examplesBase $dir
            $candidates = @(
              (Join-Path $inDir "$name.exe"),
              (Join-Path (Join-Path $inDir 'Release') "$name.exe")
            )
            $exePath = $null
            foreach ($p in $candidates) {
              if (Test-Path -LiteralPath $p) {
                $exePath = $p
                break
              }
            }
            if ($null -ne $exePath) {
              Write-Host "Testing ${name}..."
              $pinfo = New-Object System.Diagnostics.ProcessStartInfo
              $pinfo.FileName = $exePath
              $pinfo.Arguments = "--help"
              $pinfo.RedirectStandardOutput = $true
              $pinfo.RedirectStandardError = $true
              $pinfo.UseShellExecute = $false
              $p = New-Object System.Diagnostics.Process
              $p.StartInfo = $pinfo
              $p.Start() | Out-Null
              $stdout = $p.StandardOutput.ReadToEnd()
              $stderr = $p.StandardError.ReadToEnd()
              $p.WaitForExit()
              $output = $stdout + $stderr
              if ([string]::IsNullOrWhiteSpace($output)) {
                Write-Host "ERROR: ${name} produced no output"
                $failed = $true
              } else {
                Write-Host $output
                Write-Host "${name} ran successfully"
              }
            } else {
              Write-Host "ERROR: ${name} not found under ${examplesBase}/${dir}/"
              $failed = $true
            }
          }
          if ($failed) { exit 1 } else { exit 0 }

      # ---------- Upload artifacts ----------
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: livekit-sdk-${{ matrix.name }}
          path: |
            ${{ matrix.build_dir }}/lib/
            ${{ matrix.build_dir }}/include/
            ${{ matrix.build_dir }}/bin/
          retention-days: 7

      # ---------- Cleanup ----------
      - name: Clean after build (best-effort)
        if: always()
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            rm -rf build-release build-debug || true
          else
            ./build.sh clean-all || true
          fi

  docker-build-x64:
    name: Build (docker-linux-x64)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Check if Dockerfile.base changed
        id: base_changed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -q '^docker/Dockerfile\.base$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Pull base image from GHCR
        if: steps.base_changed.outputs.changed == 'false'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker pull "ghcr.io/${owner}/client-sdk-cpp-base:base-main-amd64"
          docker tag "ghcr.io/${owner}/client-sdk-cpp-base:base-main-amd64" \
            "livekit-cpp-sdk-base-x64:${{ github.sha }}"

      - name: Build base Docker image
        if: steps.base_changed.outputs.changed == 'true'
        run: |
          docker build \
            --build-arg TARGETARCH=amd64 \
            -t livekit-cpp-sdk-base-x64:${{ github.sha }} \
            -f docker/Dockerfile.base \
            docker

      - name: Build SDK Docker image
        run: |
          docker build \
            --build-arg BASE_IMAGE=livekit-cpp-sdk-base-x64:${{ github.sha }} \
            -t livekit-cpp-sdk-x64:${{ github.sha }} \
            . \
            -f docker/Dockerfile.sdk

      - name: Verify installed SDK inside image
        run: |
          docker run --rm livekit-cpp-sdk-x64:${{ github.sha }} bash -c \
            'test -f /opt/livekit-sdk/lib/cmake/LiveKit/LiveKitConfig.cmake'

      - name: Save Docker image artifact
        run: |
          docker save livekit-cpp-sdk-x64:${{ github.sha }} | gzip > livekit-cpp-sdk-x64-docker.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: livekit-cpp-sdk-docker-x64
          path: livekit-cpp-sdk-x64-docker.tar.gz
          retention-days: 7

  docker-build-linux-arm64:
    name: Build (docker-linux-arm64)
    runs-on: ubuntu-24.04-arm
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Check if Dockerfile.base changed
        id: base_changed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -q '^docker/Dockerfile\.base$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Pull base image from GHCR
        if: steps.base_changed.outputs.changed == 'false'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker pull "ghcr.io/${owner}/client-sdk-cpp-base:base-main-arm64"
          docker tag "ghcr.io/${owner}/client-sdk-cpp-base:base-main-arm64" \
            "livekit-cpp-sdk-base-arm64:${{ github.sha }}"

      - name: Build base Docker image
        if: steps.base_changed.outputs.changed == 'true'
        run: |
          docker build \
            --build-arg TARGETARCH=arm64 \
            -t livekit-cpp-sdk-base-arm64:${{ github.sha }} \
            -f docker/Dockerfile.base \
            docker

      - name: Build SDK Docker image
        run: |
          docker build \
            --build-arg BASE_IMAGE=livekit-cpp-sdk-base-arm64:${{ github.sha }} \
            -t livekit-cpp-sdk:${{ github.sha }} \
            . \
            -f docker/Dockerfile.sdk

      - name: Verify installed SDK inside image
        run: |
          docker run --rm livekit-cpp-sdk:${{ github.sha }} bash -c \
            'test -f /opt/livekit-sdk/lib/cmake/LiveKit/LiveKitConfig.cmake'

      - name: Save Docker image artifact
        run: |
          docker save livekit-cpp-sdk:${{ github.sha }} | gzip > livekit-cpp-sdk-arm64-docker.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: livekit-cpp-sdk-docker-arm64
          path: livekit-cpp-sdk-arm64-docker.tar.gz
          retention-days: 7

  build-collections-linux-arm64:
    name: Build (cpp-example-collection-linux-arm64)
    runs-on: ubuntu-24.04-arm
    needs: docker-build-linux-arm64
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      # Reclaim ~30GB before loading the multi-GB SDK image and building the
      # example collection inside it. Mirrors the docker-build jobs; without it
      # the x64 collection build has hit "no space left on device".
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Download Docker image artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: livekit-cpp-sdk-docker-arm64

      - name: Load Docker image
        run: gzip -dc livekit-cpp-sdk-arm64-docker.tar.gz | docker load

      - name: Build cpp-example-collection against installed SDK
        run: |
          cpp_ex_ref="$(git rev-parse HEAD:cpp-example-collection)"
          docker run -e CPP_EX_REF="${cpp_ex_ref}" --rm livekit-cpp-sdk:${{ github.sha }} bash -lc '
            set -euxo pipefail
            git clone https://github.com/livekit-examples/cpp-example-collection.git /tmp/cpp-example-collection
            cd /tmp/cpp-example-collection
            git fetch --depth 1 origin "$CPP_EX_REF"
            git checkout "$CPP_EX_REF"
            cmake -S . -B build -DLIVEKIT_LOCAL_SDK_DIR=/opt/livekit-sdk
            cmake --build build --parallel
          '
  build-collections-x64:
    name: Build (cpp-example-collection-x64)
    runs-on: ubuntu-latest
    needs: docker-build-x64
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      # Reclaim ~30GB before loading the multi-GB SDK image and building the
      # example collection inside it. The standard ubuntu-latest runner has hit
      # "no space left on device" here without this step.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Download Docker image artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: livekit-cpp-sdk-docker-x64

      - name: Load Docker image
        run: gzip -dc livekit-cpp-sdk-x64-docker.tar.gz | docker load

      - name: Build cpp-example-collection against installed SDK
        run: |
          cpp_ex_ref="$(git rev-parse HEAD:cpp-example-collection)"
          docker run -e CPP_EX_REF="${cpp_ex_ref}" --rm livekit-cpp-sdk-x64:${{ github.sha }} bash -lc '
            set -euxo pipefail
            git clone https://github.com/livekit-examples/cpp-example-collection.git /tmp/cpp-example-collection
            cd /tmp/cpp-example-collection
            git fetch --depth 1 origin "$CPP_EX_REF"
            git checkout "$CPP_EX_REF"
            cmake -S . -B build -DLIVEKIT_LOCAL_SDK_DIR=/opt/livekit-sdk
            cmake --build build --parallel
          '
