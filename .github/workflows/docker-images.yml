name: Docker Images

on:
  workflow_call: {}
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  metadata:
    name: Docker Metadata
    runs-on: ubuntu-latest
    outputs:
      base_changed: ${{ steps.changes.outputs.base_changed }}
      sdk_changed: ${{ steps.changes.outputs.sdk_changed }}
      base_hash: ${{ steps.hash.outputs.base_hash }}
      base_image: ${{ steps.refs.outputs.base_image }}
      sdk_image: ${{ steps.refs.outputs.sdk_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve GHCR image names
        id: refs
        shell: bash
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          {
            echo "base_image=ghcr.io/${owner}/client-sdk-cpp-base"
            echo "sdk_image=ghcr.io/${owner}/client-sdk-cpp"
          } >> "$GITHUB_OUTPUT"

      - name: Hash base Dockerfile
        id: hash
        shell: bash
        run: |
          set -euo pipefail
          base_hash="$(shasum -a 256 docker/Dockerfile.base | awk '{print substr($1,1,12)}')"
          echo "base_hash=${base_hash}" >> "$GITHUB_OUTPUT"

      - name: Detect changed inputs
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            changed_files="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          elif [[ "${{ github.event_name }}" == "push" &&
                  "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          else
            changed_files="$(git ls-tree -r --name-only "${{ github.sha }}")"
          fi

          echo "Changed files:"
          if [[ -n "${changed_files}" ]]; then
            while IFS= read -r path; do
              [[ -z "${path}" ]] && continue
              echo "  ${path}"
            done <<< "${changed_files}"
          else
            echo "  <none>"
          fi

          base_changed=false
          sdk_changed=false

          while IFS= read -r path; do
            [[ -z "${path}" ]] && continue

            if [[ "${path}" == "docker/Dockerfile.base" ]]; then
              base_changed=true
              sdk_changed=true
            fi

            case "${path}" in
              docker/*|.dockerignore|src/*|include/*|client-sdk-rust/*|cmake/*|data/*|cpp-example-collection|CMakeLists.txt|CMakePresets.json|build*|.build*|.github/workflows/docker-images.yml)
                sdk_changed=true
                ;;
            esac
          done <<< "${changed_files}"

          {
            echo "base_changed=${base_changed}"
            echo "sdk_changed=${sdk_changed}"
          } >> "$GITHUB_OUTPUT"

  validate:
    name: Validate Docker image (${{ matrix.name }})
    needs: metadata
    if: needs.metadata.outputs.sdk_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
            arch: amd64
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Login to GHCR
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull base image from GHCR
        if: needs.metadata.outputs.base_changed == 'false'
        shell: bash
        run: |
          set -euxo pipefail
          docker pull "${{ needs.metadata.outputs.base_image }}:base-main-${{ matrix.arch }}"
          docker tag "${{ needs.metadata.outputs.base_image }}:base-main-${{ matrix.arch }}" \
            "livekit-cpp-sdk-base-${{ matrix.arch }}:${{ github.sha }}"

      - name: Build base Docker image
        if: needs.metadata.outputs.base_changed == 'true'
        shell: bash
        run: |
          set -euxo pipefail
          DOCKER_BUILDKIT=1 docker build \
            --build-arg TARGETARCH=${{ matrix.arch }} \
            -t "livekit-cpp-sdk-base-${{ matrix.arch }}:${{ github.sha }}" \
            -f docker/Dockerfile.base \
            docker

      - name: Build SDK Docker image
        shell: bash
        run: |
          set -euxo pipefail
          DOCKER_BUILDKIT=1 docker build \
            --build-arg BASE_IMAGE="livekit-cpp-sdk-base-${{ matrix.arch }}:${{ github.sha }}" \
            -t "livekit-cpp-sdk-${{ matrix.arch }}:${{ github.sha }}" \
            . \
            -f docker/Dockerfile.sdk

      - name: Verify installed SDK inside image
        shell: bash
        run: |
          set -euxo pipefail
          docker run --rm "livekit-cpp-sdk-${{ matrix.arch }}:${{ github.sha }}" bash -c \
            'test -f /opt/livekit-sdk/lib/cmake/LiveKit/LiveKitConfig.cmake'

      - name: Build cpp-example-collection against installed SDK
        shell: bash
        run: |
          set -euxo pipefail
          cpp_ex_ref="$(git rev-parse HEAD:cpp-example-collection)"
          docker run -e CPP_EX_REF="${cpp_ex_ref}" --rm "livekit-cpp-sdk-${{ matrix.arch }}:${{ github.sha }}" bash -lc '
            set -euxo pipefail
            git clone https://github.com/livekit-examples/cpp-example-collection.git /tmp/cpp-example-collection
            cd /tmp/cpp-example-collection
            git fetch --depth 1 origin "$CPP_EX_REF"
            git checkout "$CPP_EX_REF"
            cmake -S . -B build -DLIVEKIT_LOCAL_SDK_DIR=/opt/livekit-sdk
            cmake --build build --parallel
          '

  publish-base:
    name: Publish base image (${{ matrix.name }})
    needs:
      - metadata
      - validate
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.metadata.outputs.base_changed == 'true' &&
      needs.validate.result == 'success'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
            arch: amd64
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push base image
        shell: bash
        run: |
          set -euxo pipefail
          docker buildx build \
            --platform linux/${{ matrix.arch }} \
            --cache-from type=registry,ref="${{ needs.metadata.outputs.base_image }}:buildcache-base-${{ matrix.arch }}" \
            --cache-to type=registry,ref="${{ needs.metadata.outputs.base_image }}:buildcache-base-${{ matrix.arch }}",mode=max \
            --push \
            -t "${{ needs.metadata.outputs.base_image }}:base-${{ needs.metadata.outputs.base_hash }}-${{ matrix.arch }}" \
            -t "${{ needs.metadata.outputs.base_image }}:base-main-${{ matrix.arch }}" \
            -f docker/Dockerfile.base \
            docker

  publish-base-manifest:
    name: Publish base manifest
    needs:
      - metadata
      - publish-base
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.metadata.outputs.base_changed == 'true' &&
      needs.publish-base.result == 'success'
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish base manifest tags
        shell: bash
        run: |
          set -euxo pipefail
          docker buildx imagetools create \
            -t "${{ needs.metadata.outputs.base_image }}:base-${{ needs.metadata.outputs.base_hash }}" \
            -t "${{ needs.metadata.outputs.base_image }}:base-main" \
            "${{ needs.metadata.outputs.base_image }}:base-${{ needs.metadata.outputs.base_hash }}-amd64" \
            "${{ needs.metadata.outputs.base_image }}:base-${{ needs.metadata.outputs.base_hash }}-arm64"

  publish-sdk:
    name: Publish SDK image (${{ matrix.name }})
    needs:
      - metadata
      - validate
      - publish-base
      - publish-base-manifest
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.metadata.outputs.sdk_changed == 'true' &&
      needs.validate.result == 'success' &&
      needs.publish-base.result != 'failure' &&
      needs.publish-base.result != 'cancelled' &&
      needs.publish-base-manifest.result != 'failure' &&
      needs.publish-base-manifest.result != 'cancelled'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
            arch: amd64
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push SDK image
        shell: bash
        run: |
          set -euxo pipefail
          if [[ "${{ needs.metadata.outputs.base_changed }}" == "true" ]]; then
            base_ref="${{ needs.metadata.outputs.base_image }}:base-${{ needs.metadata.outputs.base_hash }}-${{ matrix.arch }}"
          else
            base_ref="${{ needs.metadata.outputs.base_image }}:base-main-${{ matrix.arch }}"
          fi

          docker buildx build \
            --platform linux/${{ matrix.arch }} \
            --build-arg BASE_IMAGE="${base_ref}" \
            --cache-from type=registry,ref="${{ needs.metadata.outputs.sdk_image }}:buildcache-sdk-${{ matrix.arch }}" \
            --cache-to type=registry,ref="${{ needs.metadata.outputs.sdk_image }}:buildcache-sdk-${{ matrix.arch }}",mode=max \
            --push \
            -t "${{ needs.metadata.outputs.sdk_image }}:sha-${{ github.sha }}-${{ matrix.arch }}" \
            -t "${{ needs.metadata.outputs.sdk_image }}:main-${{ matrix.arch }}" \
            . \
            -f docker/Dockerfile.sdk

  publish-sdk-manifest:
    name: Publish SDK manifest
    needs:
      - metadata
      - publish-sdk
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.metadata.outputs.sdk_changed == 'true' &&
      needs.publish-sdk.result == 'success'
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish SDK manifest tags
        shell: bash
        run: |
          set -euxo pipefail
          docker buildx imagetools create \
            -t "${{ needs.metadata.outputs.sdk_image }}:sha-${{ github.sha }}" \
            -t "${{ needs.metadata.outputs.sdk_image }}:main" \
            "${{ needs.metadata.outputs.sdk_image }}:sha-${{ github.sha }}-amd64" \
            "${{ needs.metadata.outputs.sdk_image }}:sha-${{ github.sha }}-arm64"

  validate-published:
    name: Validate published Docker image (${{ matrix.name }})
    needs:
      - metadata
      - publish-sdk-manifest
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.metadata.outputs.sdk_changed == 'true' &&
      needs.publish-sdk-manifest.result == 'success'
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
          - name: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Login to GHCR
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull SDK image
        shell: bash
        run: |
          set -euxo pipefail
          time docker pull "${{ needs.metadata.outputs.sdk_image }}:sha-${{ github.sha }}"

      - name: Verify installed SDK inside image
        shell: bash
        run: |
          set -euxo pipefail
          docker run --rm "${{ needs.metadata.outputs.sdk_image }}:sha-${{ github.sha }}" bash -c \
            'test -f /opt/livekit-sdk/lib/cmake/LiveKit/LiveKitConfig.cmake'

      - name: Build cpp-example-collection against installed SDK
        shell: bash
        run: |
          set -euxo pipefail
          cpp_ex_ref="$(git rev-parse HEAD:cpp-example-collection)"
          docker run -e CPP_EX_REF="${cpp_ex_ref}" --rm "${{ needs.metadata.outputs.sdk_image }}:sha-${{ github.sha }}" bash -lc '
            set -euxo pipefail
            git clone https://github.com/livekit-examples/cpp-example-collection.git /tmp/cpp-example-collection
            cd /tmp/cpp-example-collection
            git fetch --depth 1 origin "$CPP_EX_REF"
            git checkout "$CPP_EX_REF"
            cmake -S . -B build -DLIVEKIT_LOCAL_SDK_DIR=/opt/livekit-sdk
            cmake --build build --parallel
          '
